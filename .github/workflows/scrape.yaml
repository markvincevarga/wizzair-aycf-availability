name: scrape

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  scrape-availabilities:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if today's data already present
        id: check
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          if compgen -G "data/${TODAY}T*.csv" > /dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Today's CSV (${TODAY}) already present — exiting cleanly."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "No CSV for ${TODAY} yet — will scrape."
          fi

      - name: Set Up Dependencies
        if: steps.check.outputs.skip != 'true' && steps.parse.outputs.stale != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends curl ghostscript ca-certificates
          curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Run Scrape
        if: steps.check.outputs.skip != 'true' && steps.parse.outputs.stale != 'true'
        run: |
          uv run --link-mode=copy main.py fetch --pdf-dir pdfs
          echo Done fetching
          echo Doing self-check: only one file must exist
          [ $(ls pdfs | wc -l) = 1 ] && echo "Success" || { echo "Failure"; ls data; exit 1; }
          mkdir artifacts
          cp pdfs/$(ls pdfs) artifacts/availability.pdf

      - uses: actions/upload-artifact@v4
        if: steps.check.outputs.skip != 'true' && steps.parse.outputs.stale != 'true'
        with:
          name: availability-pdf
          path: artifacts/availability.pdf

      - name: Run Parse
        id: parse
        if: steps.check.outputs.skip != 'true' && steps.parse.outputs.stale != 'true'
        run: |
          uv run --link-mode=copy main.py parse --data-dir data artifacts/availability.pdf
          new_files=$(git ls-files data --others --exclude-standard | wc -l | tr -d ' ')
          echo "new_files=$new_files"
          case "$new_files" in
            1)
              echo "stale=false" >> "$GITHUB_OUTPUT"
              echo "Success: one new CSV produced"
              ;;
            0)
              HHMM=$(TZ="Europe/Vienna" date +%H%M)
              if [ $((10#$HHMM)) -ge 830 ]; then
                echo "Hard fail: PDF still stale at ${HHMM} CET/CEST (past 08:30 cutoff)."
                exit 1
              fi
              echo "stale=true" >> "$GITHUB_OUTPUT"
              echo "Soft-exit: PDF still stale at ${HHMM} CET/CEST — Wizz likely hasn't published yet."
              ;;
            *)
              echo "Unexpected: $new_files new files"
              git ls-files data --others --exclude-standard
              exit 1
              ;;
          esac

      - name: Aggregate Data
        if: steps.check.outputs.skip != 'true' && steps.parse.outputs.stale != 'true'
        run: |
          uv run --link-mode=copy aggregate.py --out docs/aggregated-data.json

      - name: Setup Git Config
        if: steps.check.outputs.skip != 'true' && steps.parse.outputs.stale != 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Commit New File and Push
        if: steps.check.outputs.skip != 'true' && steps.parse.outputs.stale != 'true'
        run: |
          file_path=$(git ls-files data --others --exclude-standard)
          timestamp=$(echo "${file_path##*/}" | cut -d '.' -f 1)
          git add ${file_path} docs/aggregated-data.json
          git commit -m "add availabilities for ${timestamp}"
          git --no-pager log -n 1
          git push origin main

      - name: Trigger Deploy Pages
        if: steps.check.outputs.skip != 'true' && steps.parse.outputs.stale != 'true'
        run: gh workflow run deploy-pages.yaml
        env:
          GH_TOKEN: ${{ github.token }}
